<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleek — Contact</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #080808;
    --white: #f8f8f6;
    --gray: #888;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.02) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 48px 60px;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
  }
  .logo {
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }
  .logo:hover { opacity: 0.7; }
  .location {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* CENTER */
  .center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 560px;
    padding: 60px 0;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gray);
  }

  .headline {
    font-size: 42px;
    font-weight: 200;
    letter-spacing: -1px;
    color: var(--white);
    margin-bottom: 12px;
    line-height: 1.1;
  }

  .subline {
    font-size: 13px;
    font-weight: 300;
    color: var(--gray);
    margin-bottom: 44px;
    line-height: 1.8;
  }

  /* CONTACT LIST */
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 420px;
  }
  .contact-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 24px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .contact-item:first-child {
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .contact-item:hover { opacity: 0.6; }
  .contact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .contact-value {
    font-size: 16px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .opening-info {
    font-size: 11px;
    font-weight: 300;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .opening-info span {
    color: var(--gray);
    display: block;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    margin-top: 4px;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .container { padding: 32px 28px; }
    .headline { font-size: 32px; }
    .location { display: none; }
    .logo { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <a href="/" class="logo">Sleek</a>
    <div class="location">Koreatown &nbsp;·&nbsp; Los Angeles</div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <div class="eyebrow">Get in Touch</div>
    <h1 class="headline">We'd love to<br>hear from you.</h1>
    <p class="subline">Reach out anytime — we'd love to connect.</p>

    <div class="contact-list">
      <a href="mailto:info@sleekfitness.us" class="contact-item">
        <span class="contact-label">Email</span>
        <span class="contact-value">info@sleekfitness.us</span>
      </a>
      <a href="https://www.instagram.com/sleekfitness_" target="_blank" class="contact-item">
        <span class="contact-label">Instagram</span>
        <span class="contact-value">@sleekfitness_</span>
      </a>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">
    <div class="opening-info">
      Coming
      <span>Koreatown Plaza, Los Angeles</span>
    </div>
  </div>

</div>


</body>
</html>
